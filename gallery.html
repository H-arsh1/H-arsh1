<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chaifellows</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;600;700&display=swap');
        *{
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
input{
    display: none;
}
.container{
    width: 100%;
    text-align: center;
}
h1{
    font-weight: normal;
    font-size: 35px;
    position: relative;
    margin: 40px 0;

}
h1::before{
    content: '';
    position: absolute;
    width: 100px;
    height: 3px;
    background-color: rgb(9, 212, 9);
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    animation: animate 4s linear infinite;
}
@keyframes animate {
    0%{
    width: 100px;
}
   50%{
    width: 200px;
}
   100%{
    width: 100px;
}
}
.top-content{
    background-color: rgb(243, 245, 243);
    width: 90%;
    margin: 0 auto 20px auto;
    height: 60px;
    display: flex;
    align-items: center;
    border-radius: 5px;
    box-shadow: 3px 3px 5px lightgray;
}
h3{
    height: 100%;
    background-color: lightgray;
    line-height: 60px;
    padding: 0 50px;
    color: white;
}
label{
    display: inline-block;
    height: 100%;
    margin: 0 20px;
    line-height: 60px;
    font-size: 18px;
    color: black;
    cursor: pointer;
    transition: .5s;
}
label:hover{
    color: rgb(8, 233, 8);
}
.photo-gallery{
    width: 90%;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-gap: 20px;

}
.pic{
 position: relative;
 height: 230px;
 border-radius: 10px;

}
.pic img{
 width: 100%;
 height: 100%;
 border-radius: 10px;
 transition: .5s; 
}
.pic::before{
    content: "Photo Gallery";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 25px;
    font-weight: bold;
    width: 100%;
    margin-top: -100px;
    opacity: 0;
    transition: .3s;
    transition-delay: .2s;
}
.pic::after{
    content: "";
    position: absolute;
    left: 0;
    height: 100%;
    background-color: rgba(0, 0, 0, .4);
    width: 100%;
    transition: .3s;
}
.pic:hover::after{
height: 100%;
}
.pic:hover::before{
  margin-top: 0; 
  opacity: 1; 
}
#check1:checked ~ .container .photo-gallery .pic{
 opacity: 1; 
 transform: scale(1);
 position: relative;
 transition: .5s;  
}
#check2:checked ~ .container .photo-gallery .family{
 opacity: 1; 
 transform: scale(1);
 position: relative;
 transition: .5s;
}
#check2:checked ~ .container .photo-gallery .child{
 opacity: 1; 
 transform: scale(1);
 position: relative;
 
}
#check2:checked ~ .container .photo-gallery .place{
 opacity: 0; 
 transform: scale(0);
 position: absolute;
 transition: .5s;
 
}
    </style>
</head>
<body>
    <input type="radio" name="photo" id="check1" checked>
    <input type="radio" name="photo" id="check2">
    <input type="radio" name="photo" id="check3">
    
    <div class="container">
        <h1>Gallery</h1>
        <div class="top-content">
            <h3>Photo Gallery</h3>
            <label for="check1">All photos</label>
            <label for="check2">Foods</label>
            <label for="check3">outlets</label>
        </div>
<div class="photo-gallery">
    <div class="pic place">
        <img src="franc/cafe.jpg">
    </div>
    <div class="pic family">
        <img src="franc/chai-tea.png">
    </div>
    <div class="pic child">
        <img src="franc/images.jpg">
    </div>
    <div class="pic place">
        <img src="franc/periperi.jpg">
    </div>
    <div class="pic family">
        <img src="franc/sandwhich.jpg">
    </div>
    <div class="pic child">
        <img src="franc/wall.jpg">
    </div>
    <div class="pic place ">
        <img src="franc/chai1.jpg">
    </div>
    <div class="pic family">
        <img src="franc/chai2.jpg">
    </div>
    <div class="pic child">
        <img src="franc/chai-tea.png">
    </div>
</div>
    </div>
</body>
</html>
